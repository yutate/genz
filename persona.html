<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Talk | Z世代 Signal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #ffffff;
    --surface: #f5f5f7;
    --surface2: #ededf0;
    --border: rgba(0,0,0,0.09);
    --border-active: rgba(0,0,0,0.22);
    --text: #1a1a2e;
    --text-dim: #6b6b80;
    --text-muted: #b0b0c0;
    --accent: #6558f5;
    --accent-glow: rgba(101,88,245,0.12);
    --accent2: #2bb5a0;
  }

  /* ライトモードがデフォルト。ダークはdata-theme="dark"で切替 */
  [data-theme="dark"] {
    --bg: #0c0c0f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --border-active: rgba(255,255,255,0.18);
    --text: #e8e8f0;
    --text-dim: #666680;
    --text-muted: #3a3a50;
    --accent: #7c6ef7;
    --accent-glow: rgba(124,110,247,0.15);
    --accent2: #4ec9b0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    font-size: 16px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.92);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
    text-decoration: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--text); }
  .back-btn svg { width: 14px; height: 14px; }
  .header-sep { width: 1px; height: 16px; background: var(--border); }
  .header-title {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .header-badge {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    letter-spacing: 0.08em;
    opacity: 0.7;
  }

  /* ── Layout ── */
  .layout {
    flex: 1;
    display: flex;
    height: calc(100vh - 49px);
    overflow: hidden;
  }

  /* ── Left Panel ── */
  .left-panel {
    width: clamp(280px, 30%, 480px);
    min-width: 280px;
    max-width: 480px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 22px 20px;
    gap: 20px;
    resize: horizontal;
    overflow-x: hidden;
  }

  /* ── Right Panel ── */
  .right-panel {
    flex: 1;
    min-width: 0;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .form-group { display: flex; flex-direction: column; gap: 10px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
    margin-bottom: 5px;
  }

  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    font-size: 13px;
    border-radius: 6px;
    padding: 8px 11px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  select option { background: #1a1a24; }
  textarea { resize: vertical; min-height: 68px; }

  .quick-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 11px;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    letter-spacing: 0.03em;
  }
  .tag:hover { border-color: var(--accent); color: var(--accent); }
  .tag.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

  .gen-btn {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    text-transform: uppercase;
  }
  .gen-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
  .gen-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .gen-status {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-align: center;
    opacity: 0;
    height: 16px;
    transition: opacity 0.3s;
  }
  .gen-status.show { opacity: 1; }

  /* ── Persona Card ── */
  .persona-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: none;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.35s ease;
  }
  .persona-card.show { display: flex; }
  .persona-name { font-size: 16px; font-weight: 500; line-height: 1.4; }
  .persona-meta { display: flex; flex-wrap: wrap; gap: 5px; }
  .meta-chip {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    color: var(--text-dim);
  }
  .persona-desc { font-size: 13px; color: var(--text-dim); line-height: 1.75; }
  .persona-kws { display: flex; flex-wrap: wrap; gap: 5px; }
  .kw-chip {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border: 1px solid rgba(124,110,247,0.35);
    color: var(--accent);
    border-radius: 4px;
  }
  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.15s;
    align-self: flex-start;
  }
  .reset-btn:hover { border-color: var(--border-active); color: var(--text); }

  .right-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--text-muted);
  }
  .empty-icon {
    width: 44px; height: 44px;
    border: 1px solid var(--text-muted);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.35;
  }
  .empty-state p {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.07em;
    text-align: center;
    line-height: 1.8;
  }

  /* ── Chat ── */
  .chat-area { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  .chat-area.show { display: flex; }

  .chat-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .chat-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .chat-name { font-size: 15px; font-weight: 500; }
  .chat-sub { font-size: 12px; color: var(--text-dim); font-family: 'DM Mono', monospace; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .message { display: flex; gap: 9px; max-width: 82%; animation: fadeUp 0.22s ease; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.assistant { align-self: flex-start; }

  .msg-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }
  .message.user .msg-avatar { background: rgba(255,255,255,0.07); color: var(--text-dim); }
  .message.assistant .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }

  .msg-bubble {
    padding: 9px 13px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.8;
    letter-spacing: 0.01em;
    white-space: pre-wrap;
  }
  .message.user .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top-right-radius: 3px;
  }
  .message.assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 3px;
  }

  .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
  .dot { width: 5px; height: 5px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .suggestions {
    padding: 0 20px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .sug-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 300;
    padding: 5px 11px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .sug-btn:hover { border-color: var(--accent); color: var(--accent); }

  .input-bar {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-bar textarea {
    flex: 1;
    min-height: 40px;
    max-height: 120px;
    padding: 9px 12px;
    font-size: 13px;
    resize: none;
    line-height: 1.5;
    border-radius: 8px;
  }
  .send-btn {
    width: 38px; height: 38px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.15s;
  }
  .send-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn svg { width: 15px; height: 15px; fill: #fff; }

  /* ── Image attach ── */
  .attach-btn {
    width: 38px; height: 38px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--text-dim);
    font-size: 18px;
    transition: all 0.15s;
  }
  .attach-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .attach-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .image-preview-bar {
    padding: 8px 20px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .image-preview-item {
    position: relative;
    width: 64px; height: 64px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .image-preview-item img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .image-preview-del {
    position: absolute;
    top: 2px; right: 2px;
    width: 18px; height: 18px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .msg-images {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .msg-images img {
    max-width: 160px;
    max-height: 160px;
    border-radius: 8px;
    object-fit: cover;
    border: 1px solid var(--border);
    cursor: pointer;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Persona Library ── */
  .lib-section { border-top: 1px solid var(--border); padding-top: 16px; }
  .lib-list { display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; }
  .lib-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .lib-item:hover { border-color: var(--accent); }
  .lib-item-info { flex: 1; min-width: 0; }
  .lib-item-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lib-item-meta { font-size: 10px; color: var(--text-dim); font-family: 'DM Mono', monospace; }
  .lib-item-del {
    background: none; border: none; color: var(--text-muted);
    font-size: 14px; cursor: pointer; padding: 2px 4px;
    transition: color 0.15s; flex-shrink: 0;
  }
  .lib-item-del:hover { color: #f07070; }
  .lib-empty { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; padding: 8px 0; }
  .lib-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .lib-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'DM Mono', monospace;
    font-size: 10px; padding: 5px 10px; border-radius: 5px;
    cursor: pointer; letter-spacing: 0.06em; transition: all 0.15s;
  }
  .lib-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Chat toolbar ── */
  .chat-toolbar {
    padding: 6px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 7px; align-items: center;
  }
  .toolbar-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'DM Mono', monospace;
    font-size: 10px; padding: 4px 9px; border-radius: 5px;
    cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s;
  }
  .toolbar-btn:hover { border-color: var(--accent); color: var(--accent); }
  .toolbar-model {
    margin-left: auto; font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .api-panel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .api-row { display: flex; gap: 8px; align-items: center; }
  .api-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    border-radius: 6px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-input:focus { border-color: var(--accent); }
  .api-save-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    letter-spacing: 0.06em;
  }
  .api-save-btn:hover { border-color: var(--accent); color: var(--accent); }
  .api-hint { font-size: 10px; color: var(--text-muted); margin-top: 7px; font-family: 'DM Mono', monospace; }
  .api-hint a { color: var(--text-dim); }
  .api-saved { font-size: 10px; color: var(--accent2); font-family: 'DM Mono', monospace; display: none; }

  @media (max-width: 680px) {
    .layout {
      grid-template-columns: 1fr;
      height: auto;
      min-height: calc(100vh - 49px);
    }
    .left-panel {
      max-height: none;
      height: auto;
      overflow-y: visible;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 16px;
    }
    .right-panel {
      height: 70vh;
      min-height: 400px;
    }
  }
</style>
</head>
<body>

<header>
  <a href="/genz/" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
    Dashboard
  </a>
  <div class="header-sep"></div>
  <span class="header-title">Persona Talk</span>
  <button id="theme-toggle" onclick="toggleTheme()" style="
    margin-left:8px; background:none; border:1px solid var(--border);
    color:var(--text-dim); font-size:14px; width:30px; height:30px;
    border-radius:6px; cursor:pointer; transition:all 0.15s;
    display:flex; align-items:center; justify-content:center;
  " title="ライト/ダーク切替">🌙</button>
  <span class="header-badge">BETA</span>
  <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:0.08em;">v2.6.1</span>
</header>

<div class="layout">

  <!-- ── Left: Setup ── -->
  <div class="left-panel">
    <div id="setup-section">
      <div class="section-label">ペルソナ設定</div>
      <div class="api-panel" style="margin-bottom:16px">
        <div class="section-label" style="margin-bottom:8px">AI / API KEY</div>
        <select id="ai-select" class="api-input" style="margin-bottom:8px;flex:none;width:100%" onchange="onAiChange()">
          <option value="claude">Claude (Anthropic)</option>
          <option value="openai">GPT-4o (OpenAI)</option>
          <option value="gemini">Gemini (Google)</option>
        </select>
        <div class="api-row">
          <input type="password" class="api-input" id="api-key-input" placeholder="sk-ant-..." oninput="onKeyInput()" />
          <button class="api-save-btn" onclick="saveKey()">保存</button>
        </div>
        <div class="api-hint" id="api-hint">取得先: <a href="https://console.anthropic.com/" target="_blank">console.anthropic.com</a> ｜ ブラウザに保存されます</div>
        <div class="api-saved" id="api-saved">✓ 保存済み</div>
      </div>

      <div class="form-group">

        <div class="form-row">
          <div>
            <label>年齢</label>
            <input type="text" id="age" placeholder="22" />
          </div>
          <div>
            <label>性別</label>
            <select id="gender">
              <option value="">指定なし</option>
              <option value="女性">女性</option>
              <option value="男性">男性</option>
              <option value="ノンバイナリー">ノンバイナリー</option>
            </select>
          </div>
        </div>

        <div>
          <label>居住エリア</label>
          <select id="area">
            <option value="">指定なし</option>
            <option value="都市部（東京・大阪等）">都市部（東京・大阪等）</option>
            <option value="地方都市">地方都市</option>
            <option value="郊外">郊外</option>
            <option value="地方・農村">地方・農村</option>
          </select>
        </div>

        <div>
          <label>生成モデル</label>
          <select id="gen-model-select" class="api-input" style="width:100%"></select>
        </div>

        <div>
          <label>職業・ライフステージ</label>
          <input type="text" id="job" placeholder="大学生 / 新卒会社員 / フリーランス…" />
        </div>

        <div>
          <label>関心・ライフスタイル軸</label>

性の進化。"},{"heading":"② AIは「補助線」から「現実代替」へ","body":"Q1で最大の変化はここ。 1月：補助線 2月：共存設計 3月：代替手段"},{"heading":"③ 推し活の完全インフラ化","body":"推し活はQ1で「最終形」に近づいた。 情熱 → 持続 → 管理"}]},{"type":"monthly","id":"2026-03","title":"2026/03 月次考察","summary":"Z世代は「壊れない」から「外さない」へ——“失敗回避社会”の完成 1月は自己防衛、2月は納得主権でした。 そして3月は、その先。 「そもそも失敗しない選び方をする」社会が完成した月 でした。","keywords":["失敗回避","距離設計","接続最適化","自己最適化","感情インフラ","AI関係化"],"sections":[{"heading":"総論","body":"Z世代は「壊れない」から「外さない」へ——“失敗回避社会”の完成 1月は自己防衛、2月は納得主権でした。 そして3月は、その先。 「そもそも失敗しない選び方をする」社会が完成した月 でした。"},{"heading":"① 「選ばない」ではなく「外さない」へ","body":"2月までのZ世代は 距離を取る 消耗を避ける 自分を守る という「防御」だった。 しかし3月は違う。 うま確フード AI予約 SNS検索 レビュー依存 推し経由意思決定 👉 “最初から失敗しない選択”をする行動様式へ"},{"heading":"🔎 本質","body":"Z世代は選択を減らしたのではない。 「失敗する可能性のある選択」を排除している"},{"heading":"② 情報は「理解」ではなく「即使える状態」へ","body":"TikTokで勉強 ショート動画教育 BL読書継承 AI検索 音声・動画中心 👉 情報の価値が変わった"},{"heading":"🔎 本質","body":"「覚える」から「呼び出す」へ 知識は持つものではなく、 アクセスできる状態にあることが重要"},{"heading":"③ 表現は「増やす」から「削る」へ","body":"投稿ゼロ 盛らない 無音・字幕 実在しないインフルエンサー スキップ前提広告 👉 Z世代の表現は 足す文化 → 引く文化"},{"heading":"④ 推し活は「情熱」から「資産管理」へ","body":"3月は推し活の質的変化が明確だった。 グッズ圧迫問題 処分罪悪感 推し活金融化 AI推し 推し活市場拡大 👉 推し活は完全に 娯楽 → インフラ → 管理対象 へ。"}]},{"type":"monthly","id":"2026-02","title":"2026/02 月次考察","summary":"","keywords":["距離設計","接続最適化","感情インフラ","AI関係化","信頼構造変化","文脈選別"],"sections":[{"heading":"① 消耗回避から始まった2月前半","body":"――「離れる」ことが成熟のサインになった 2月前半、最も象徴的だったのは「一時的に離れる」というキーワードだった。 投稿ゼロ、界隈SNS、ログアウトという選択肢の広がりは、 若者がデジタルから離れていることを意味しない。 むしろ逆だ。 Z世代は、 SNSやAIを手放すのではなく、“常時接続”をやめた。 情報過多社会において、 つながり続けること 見られ続けること 判断し続けること は、心理的コストを伴う。 そこでZ世代は、 使うが、距離を取る 接続するが、常駐しない という設計へ移行した。 これは回避ではない。 高度な自己防衛的最適化である。"},{"heading":"② 推し活の制度化","body":"――「好き」から「生活インフラ」へ 2月は、推し活が完全に構造化された月でもあった。 分散推し、推し活3.0、推し活経済4兆円規模、 さらには「推し活という言葉に違和感」という言説まで登場した。 これはブームの終わりではない。 推し活は今、 熱狂するものから日常に配置するもの へと進化している。 推し活は“燃やす対象”ではなく、 感情の安定装置として生活の中に組み込まれている。 推しは単数ではなく複数へ、 一時的熱量ではなく持続可能性へ。 文化はインフラ化したとき、 名前のほうが古くなる。 2月は、その転換点だった。"},{"heading":"③ 消費は「意味投資」へ","body":"――コスパではなく、納得パ Z世代の消費はもはや「安いかどうか」では決まらない。 高級ヘッドホンや高価格帯コームは支持される一方で、 義務的な飲み会や意味の薄い出費は拒否される。 ここにあるのは、 価格合理性ではなく感情合理性 である。 Z世代は、 何にお金を使うか 何を削るか を極めて戦略的に選別している。 無駄遣い卒業、選別投資、デュープ文化。 消費は欲望の発露ではなく、 自己肯定と生活安定のための配分行為になった。"},{"heading":"④ AIとの共存設計","body":"――主導権は渡さない AI利用率は8割を超えた。 しかし同時に、AIへの不安も拡大している。 Z世代はAIを信頼しているが、 盲信はしていない。 AIは、 失敗を減らす 摩擦を和らげる 判断を補助する 存在として機能している。 しかし「自分でやった感」が奪われることへの不安は強い。 Z世代にとってAIは、 便利な道具ではなく境界線のある補助線 主導権はあくまで自分にある。 この距離設計が、 α世代との最大の断絶点になる。"}]}],"global_kws":["AI関係化","感情インフラ","接続最適化","距離設計","消費合理化","信頼構造変化","文脈選別","デジタル疲労","社会不安","制御可能性","自己最適化","キャリア再設計","家族再評価","失敗回避","金融リテラシー","熱狂管理","学びの短縮化","アナログ回帰","検索回避","表現の削減","言語軽量化","防御的消費","AI主導権設計","感情防衛","防衛的キャリア","意味投資消費","オフライン回帰","安全接続設計","情報アクセス化","安全資産","体験志向","参加の軽量化","恋愛再定義","PR拒否","SNS疲労","AI境界","自己防衛","美意識変化","接続設計","消耗回避","納得主権","低期待社会"],"kw_articles":{"AI主導権設計":[{"title":"「将来が奪われる」 AIネイティブのZ世代が抱く切実な拒否感の正体","url":"https://news.yahoo.co.jp/articles/1ce7b7f35760aaaf8d14755dd93c8f61872da793"},{"title":"「何者でもない」学生に寄り添う 博報堂が自己分析ノートを新卒採用で展開","url":"https://www.advertimes.com/20260413/article541150/"},{"title":"｢無知だと思われて…｣｢AIに聞くから｣上司に相談しない\"今どきの若手\"が考えている事","url":"https://toyokeizai.net/articles/-/940907"}],"感情防衛":[{"title":"「将来が奪われる」 AIネイティブのZ世代が抱く切実な拒否感の正体","url":"https://news.yahoo.co.jp/articles/1ce7b7f35760aaaf8d14755dd93c8f61872da793"},{"title":"「何者でもない」学生に寄り添う 博報堂が自己分析ノートを新卒採用で展開","url":"https://www.advertimes.com/20260413/article541150/"},{"title":"｢無知だと思われて…｣｢AIに聞くから｣上司に相談しない\"今どきの若手\"が考えている事","url":"https://toyokeizai.net/articles/-/940907"}],"防衛的キャリア":[{"title":"「将来が奪われる」 AIネイティブのZ世代が抱く切実な拒否感の正体","url":"https://news.yahoo.co.jp/articles/1ce7b7f35760aaaf8d14755dd93c8f61872da793"},{"title":"「何者でもない」学生に寄り添う 博報堂が自己分析ノートを新卒採用で展開","url":"https://www.advertimes.com/20260413/article541150/"},{"title":"｢無知だと思われて…｣｢AIに聞くから｣上司に相談しない\"今どきの若手\"が考えている事","url":"https://toyokeizai.net/articles/-/940907"}],"意味投資消費":[{"title":"「将来が奪われる」 AIネイティブのZ世代が抱く切実な拒否感の正体","url":"https://news.yahoo.co.jp/articles/1ce7b7f35760aaaf8d14755dd93c8f61872da793"},{"title":"「何者でもない」学生に寄り添う 博報堂が自己分析ノートを新 // ─── Retry helper ───
async function fetchWithRetry(fn, maxRetry = 3, statusEl = null) {
  const delays = [5, 15, 30];
  for (let i = 0; i < maxRetry; i++) {
    try {
      return await fn();
    } catch(e) {
      const isRetryable = e.status === 429 || e.status === 500 || e.status === 503;
      if (!isRetryable || i === maxRetry - 1) throw e;
      const wait = delays[i];
      const total = maxRetry - 1;
      if (statusEl) statusEl.textContent = `混雑中のため待機しています... ${wait}秒後に再試行 (${i+1}/${total})`;
      await new Promise(r => setTimeout(r, wait * 1000));
      if (statusEl) statusEl.textContent = 'GENERATING PERSONA...';
    }
  }
}

async function callAPI(body, headers, url) {
  const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
  if (!res.ok) {
    const text = await res.text();
    const err = new Error('API error ' + res.status + ': ' + text.slice(0, 200));
    err.status = res.status;
    throw err;
  }
  return res.json();
}

// ─── Build Signal context from embedded data ───
function buildSignalContext() {
  if (typeof PERSONA_DATA === 'undefined' || !PERSONA_DATA.insights) return '';
  let ctx = '';
  for (const item of PERSONA_DATA.insights.slice(0, 3)) {
    ctx += '\n【' + item.title + '】\n';
    if (item.summary) ctx += item.summary.slice(0, 200) + '\n';
    for (const s of item.sections.slice(0, 5)) {
      if (s.body) ctx += s.heading + ': ' + s.body.slice(0, 150) + '\n';
    }
    if (item.keywords && item.keywords.length) {
      ctx += 'キーワード: ' + item.keywords.join('、') + '\n';
    }
  }
  if (PERSONA_DATA.global_kws && PERSONA_DATA.global_kws.length) {
    ctx += '\n頻出キーワード全体: ' + PERSONA_DATA.global_kws.slice(0, 15).join('、');
  }
  return ctx;
}

// ─── Generate Persona ───
async function generatePersona() {
  const age      = document.getElementById('age').value.trim();
  const gender   = document.getElementById('gender').value;
  const area     = document.getElementById('area').value;
  const job      = document.getElementById('job').value.trim();
  const extra    = document.getElementById('extra').value.trim();
  const interests = [...selectedInterests].join('、');

  const apiKey = getKey();
  if (!apiKey) {
    alert('APIキーを入力・保存してください');
    return;
  }
  if (!age && !job && selectedInterests.size === 0) {
    alert('年齢・職業・関心軸のいずれかを入力してください');
    return;
  }

  const btn = document.getElementById('gen-btn');
  const status = document.getElementById('gen-status');
  btn.disabled = true;
  status.classList.add('show');

  const signalCtx = buildSignalContext();

  const prompt = `あなたはZ世代のリサーチ専門家です。以下の条件と最新のZ世代インサイトを元に、リアルなペルソナを設計してください。

【条件】
年齢: ${age || '20代前半'}
性別: ${gender || '指定なし'}
居住: ${area || '指定なし'}
職業: ${job || '指定なし'}
関心: ${interests || '指定なし'}
特記: ${extra || 'なし'}

【Z世代最新インサイト（Signal Dashboard）】
${signalCtx}

以下のJSON形式のみで回答してください（マークダウン不要）：
{"name":"架空の日本人名","age":"XX歳","gender":"性別","area":"居住","job":"職業","tagline":"20字以内の一言","description":"人物像・価値観・日常行動（150字程度）","keywords":["KW1","KW2","KW3","KW4"],"systemPrompt":"このペルソナとして振る舞うための指示（一人称・口調・価値観・反応パターン含む・300字）","suggestedQuestions":["質問例1","質問例2","質問例3"],"media_touch":{"sns":[{"name":"TikTok","usage":"トレンド発見・商品リサーチ"},{"name":"Instagram","usage":"保存・比較・世界観チェック"}],"video_music":[{"name":"YouTube","usage":"レビュー・How-to動画"},{"name":"Spotify","usage":"BGM・プレイリスト"}],"news_info":[{"name":"SmartNews","usage":"朝の通勤中にざっと確認"}],"ooh":[{"type":"電車内映像広告","behavior":"流し見・気になったら後でスマホ検索"},{"type":"電車内静止画広告","behavior":"乗換駅でスキャン・QRはたまに読む"},{"type":"駅構内サイネージ","behavior":"歩きながら視界に入る程度"},{"type":"屋外ビジョン","behavior":"待ち時間に目に入る"}]}}`;

  try {
    const ai = currentAi();
    const cfg = AI_CONFIGS[ai];
    localStorage.setItem('persona_last_ai', ai);
    const statusEl = document.getElementById('gen-status');
    let raw;
    await fetchWithRetry(async () => {
      let data;
      if (ai === 'claude') {
        data = await callAPI(
          { model: currentGenModel(), max_tokens: 2000, messages: [{ role: 'user', content: prompt }] },
          { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
          'https://api.anthropic.com/v1/messages'
        );
        raw = data.content[0].text;
      } else if (ai === 'openai') {
        data = await callAPI(
          { model: currentGenModel(), max_tokens: 2000, messages: [{ role: 'user', content: prompt }] },
          { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
          'https://api.openai.com/v1/chat/completions'
        );
        raw = data.choices[0].message.content;
      } else {
        data = await callAPI(
          { contents: [{ parts: [{ text: prompt }] }] }, // genModel used via URL
          { 'Content-Type': 'application/json' },
          'https://generativelanguage.googleapis.com/v1beta/models/' + currentGenModel() + ':generateContent?key=' + apiKey
        );
        if (data.error) { const e = new Error(data.error.message); e.status = data.error.code; throw e; }
        raw = data.candidates[0].content.parts[0].text;
      }
    }, 3, statusEl);
    raw = (raw || '').replace(/```json|```/g, '').trim();
    const start = raw.indexOf('{');
    const end = raw.lastIndexOf('}');
    if (start === -1 || end === -1 || end <= start) throw new Error('有効なJSONを取得できませんでした');
    const persona = JSON.parse(raw.slice(start, end + 1));
    personaData = persona;
    conversationHistory = [];
    renderPersonaCard(persona);
    initChat(persona);
  } catch(e) {
    console.error(e);
    console.error('Generation error:', e); alert('生成に失敗しました（3回リトライ後）: ' + e.message);
  } finally {
    btn.disabled = false;
    status.classList.remove('show');
  }
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text && attachedImages.length === 0) return;
  if (!personaData) return;

  const images = [...attachedImages];
  input.value = '';
  autoResize(input);
  clearImages();
  document.getElementById('suggestions').innerHTML = '';
  document.getElementById('send-btn').disabled = true;

  // メッセージ表示（画像+テキスト）
  appendMessageWithImages('user', text, images);

  // 会話履歴（API送信用）
  if (images.length > 0) {
    const contentArr = images.map(img => ({
      type: 'image',
      source: { type: 'base64', media_type: img.mediaType, data: img.base64 }
    }));
    if (text) contentArr.push({ type: 'text', text });
    conversationHistory.push({ role: 'user', content: contentArr });
  } else {
    conversationHistory.push({ role: 'user', content: text });
  }

  const typingId = appendTyping();

  const signalCtx = buildSignalContext();
  const system = personaData.systemPrompt + '\n\n【Signal最新データ補足】\n' + signalCtx
    + '\n\n必ずこのペルソナの口調・価値観で自然に返答してください。分析的な言葉は使わず、150〜250字程度で。';

  try {
    const apiKey = getKey();
    const ai = currentAi();
    const cfg = AI_CONFIGS[ai];
    let reply;
    await fetchWithRetry(async () => {
      let data;
      if (ai === 'claude') {
        data = await callAPI(
          { model: currentChatModel(), max_tokens: 1000, system: system, messages: conversationHistory },
          { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
          'https://api.anthropic.com/v1/messages'
        );
        reply = data.content[0].text;
      } else if (ai === 'openai') {
        // OpenAIはimage_urlフォーマットに変換
      const msgs = [{ role: 'system', content: system }, ...conversationHistory.map(m => {
        if (Array.isArray(m.content)) {
          return { role: m.role, content: m.content.map(c =>
            c.type === 'image' ? { type: 'image_url', image_url: { url: 'data:' + c.source.media_type + ';base64,' + c.source.data } }
            : c
          )};
        }
        return m;
      })];
        data = await callAPI(
          { model: currentChatModel(), max_tokens: 1000, messages: msgs },
          { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
          'https://api.openai.com/v1/chat/completions'
        );
        reply = data.choices[0].message.content;
      } else {
        const contents = conversationHistory.map(m => {
          const role = m.role === 'assistant' ? 'model' : 'user';
          if (Array.isArray(m.content)) {
            const parts = m.content.map(c =>
              c.type === 'image'
                ? { inline_data: { mime_type: c.source.media_type, data: c.source.data } }
                : { text: c.text || '' }
            );
            return { role, parts };
          }
          return { role, parts: [{ text: m.content }] };
        });
        data = await callAPI(
          { system_instruction: { parts: [{ text: system }] }, contents, generationConfig: { maxOutputTokens: 1000 } },
          { 'Content-Type': 'application/json' },
          'https://generativelanguage.googleapis.com/v1beta/models/' + currentGenModel() + ':generateContent?key=' + apiKey
        );
        if (data.error) { const e = new Error(data.error.message); e.status = data.error.code; throw e; }
        reply = data.candidates[0].content.parts[0].text;
      }
    }, 3);
    removeTyping(typingId);
    appendMessage('assistant', reply);
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    removeTyping(typingId);
    appendMessage('assistant', '…（うまく答えられなかった）');
    console.error(e);
  } finally {
    document.getElementById('send-btn').disabled = false;
  }
}

function handleImageSelect(event) {
  const files = Array.from(event.target.files);
  const remaining = 3 - attachedImages.length;
  const toAdd = files.slice(0, remaining);
  toAdd.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      const [header, base64] = dataUrl.split(',');
      const mediaType = header.match(/:(.*?);/)[1];
      attachedImages.push({ base64, mediaType, previewUrl: dataUrl });
      renderImagePreview();
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function renderImagePreview() {
  const bar = document.getElementById('image-preview-bar');
  if (!attachedImages.length) { bar.innerHTML = ''; return; }
  bar.innerHTML = attachedImages.map((img, i) =>
    '<div class="image-preview-item">'
    + '<img src="' + img.previewUrl + '">'
    + '<button class="image-preview-del" onclick="removeImage(' + i + ')">✕</button>'
    + '</div>'
  ).join('');
  // 3枚でattachボタン無効
  const attachInput = document.getElementById('image-input');
  if (attachInput) attachInput.disabled = attachedImages.length >= 3;
}

function removeImage(index) {
  attachedImages.splice(index, 1);

function clearImages() {

function savePersonaToLib() {

    savedAt: new Date().toISOString(),
    persona: personaData,

function loadPersonaFromLib(id) {

  personaData = entry.persona;

function deleteFromLib(id) {

  renderLib();
}

function renderLib() {
  const lib = getLib();
  const el = document.getElementById('lib-list');
  if (!lib.length) {
    el.innerHTML = '<div class="lib-empty">保存済みペルソナはありません</div>';
    return;
  }
  el.innerHTML = lib.map(e => {
    const date = new Date(e.savedAt).toLocaleDateString('ja-JP', {month:'numeric',day:'numeric'});
    const turns = Math.floor((e.history||[]).length / 2);
    return '<div class="lib-item">'
      + '<div class="lib-item-info" onclick="loadPersonaFromLib(' + e.id + ')">'
      + '<div class="lib-item-name">' + e.persona.name + '</div>'

      + '</div>'

function exportLib() {

  if (!lib.length) { alert('保存済みペルソナがありません'); return; }
  download('persona_library.json', JSON.stringify(lib, null, 2));
}

function importLib(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('invalid');
      const current = getLib();
      const merged = [...data, ...current].reduce((acc, item) => {
        if (!acc.find(x => x.id === item.id)) acc.push(item);
        return acc;
      }, []);
      merged.sort((a, b) => b.id - a.id);
      saveLib(merged.slice(0, 20));
      renderLib();
      alert(data.length + '件をインポートしました');
    } catch(e) { alert('読み込みに失敗しました'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── Chat Export / Import ───
function exportChat() {
  if (!personaData) return;
  const data = { persona: personaData, history: conversationHistory, exportedAt: new Date().toISOString() };
  download('chat_' + personaData.name + '_' + Date.now() + '.json', JSON.stringify(data, null, 2));
}

function importChat(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.persona) throw new Error('invalid');
      personaData = data.persona;
      conversationHistory = data.history || [];
      renderPersonaCard(personaData);
      initChatFromLib(personaData, conversationHistory);
    } catch(e) { alert('読み込みに失敗しました'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function initChatFromLib(p, history) {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chat-area').classList.add('show');
  document.getElementById('chat-avatar').textContent = p.name.charAt(0);
  document.getElementById('chat-name').textContent = p.name + '（' + p.age + '）';
  document.getElementById('chat-sub').textContent = p.tagline;
  document.getElementById('messages').innerHTML = '';

  // 保存済み会話を再描画
  history.forEach(m => appendMessage(m.role, m.content));

  if (!history.length) {
    appendMessage('assistant', 'はじめまして、' + p.name + 'です。\n' + p.description);
    renderSuggestions(p.suggestedQuestions || []);
  }
  updateToolbarModel();
  document.getElementById('user-input').disabled = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('image-input').disabled = false;
  document.getElementById('user-input').focus();
}

function updateToolbarModel() {
  // chat-model-selectは既にonAiChangeで設定済み。何もしなくてOK
}

// ─── Persona Sheet ───
async function generateSheet() {
  if (!personaData || conversationHistory.length === 0) {
    alert('ペルソナを生成して対話してからシートを作成してください'); return;
  }
  const btn = document.getElementById('sheet-btn');
  btn.disabled = true;
  document.getElementById('sheet-modal').style.display = 'block';
  document.getElementById('sheet-content').innerHTML = '<div style="padding:60px;text-align:center;color:#888;font-family:DM Mono,monospace;font-size:13px;letter-spacing:0.1em;">ANALYZING CONVERSATION...</div>';
  document.getElementById('sheet-generating').style.display = 'inline';

  const convText = conversationHistory
    .filter(m => typeof m.content === 'string')
    .map(m => (m.role === 'user' ? 'Q: ' : 'A: ') + m.content)
    .join('\n');

  const prompt = 'Z世代ペルソナ「' + personaData.name + '」との対話を分析して、マーケター向けペルソナシートの内容をJSONで出力してください。\n\n【ペルソナ基本情報】\n名前:' + personaData.name + '\n年齢:' + personaData.age + '\nタグライン:' + personaData.tagline + '\n説明:' + personaData.description + '\n\n【対話記録】\n' + convText.slice(0, 3000) + '\n\n以下のJSON形式のみで出力（マークダウン不要）:\n{"values":[{"title":"価値観","body":"説明50字以内"},{"title":"...","body":"..."},{"title":"...","body":"..."}],"behaviors":[{"title":"行動パターン","body":"説明50字以内"},{"title":"...","body":"..."},{"title":"...","body":"..."}],"quotes":["印象的な発言1（30字以内）","発言2","発言3"],"marketing_insight":"マーケティング示唆100字程度","signal_keywords":["KW1","KW2","KW3","KW4","KW5"]}';

  try {
    const apiKey = getKey();
    const ai = currentAi();
    const cfg = AI_CONFIGS[ai];
    let raw;
    if (ai === 'claude') {
      const data = await callAPI(
        { model: currentGenModel(), max_tokens: 2000, messages: [{ role: 'user', content: prompt }] },
        { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        'https://api.anthropic.com/v1/messages'
      );
      raw = data.content[0].text;
    } else if (ai === 'openai') {
      const data = await callAPI(
        { model: currentGenModel(), max_tokens: 2000, messages: [{ role: 'user', content: prompt }] },
        { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        'https://api.openai.com/v1/chat/completions'
      );
      raw = data.choices[0].message.content;
    } else {
      const data = await callAPI(
        { contents: [{ parts: [{ text: prompt }] }] },
        { 'Content-Type': 'application/json' },
        'https://generativelanguage.googleapis.com/v1beta/models/' + currentGenModel() + ':generateContent?key=' + apiKey
      );
      raw = data.candidates[0].content.parts[0].text;
    }
    raw = (raw || '').replace(/```json|```/g, '').trim();
    const si = raw.indexOf('{'), ei = raw.lastIndexOf('}');
    const analysis = JSON.parse(raw.slice(si, ei + 1));
    renderSheet(personaData, analysis);
  } catch(err) {
    document.getElementById('sheet-content').innerHTML = '<div style="padding:40px;color:#e74c3c;">生成エラー: ' + err.message + '</div>';
  } finally {
    btn.disabled = false;
    document.getElementById('sheet-generating').style.display = 'none';
  }
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderSheet(p, a) {
  const kwArticles = (typeof PERSONA_DATA !== 'undefined' && PERSONA_DATA.kw_articles) ? PERSONA_DATA.kw_articles : {};

      }).join('')
    + '</div></div>'

  }).join('');

  const kwArticlesHTML = signalKws.map(function(kw) {

      ? arts.map(function(art) {

        }).join('')
      : '<div style="font-size:11px;color:#aaa;padding-left:10px;">\u95a2\u9023\u8a18\u4e8b\u306a\u3057</div>';
    return '<div style="margin-bottom:16px;"><div style="display:inline-block;background:#e8f5e9;color:#2e7d32;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;margin-bottom:6px;">' + esc(kw) + '</div>' + artsHTML + '</div>';
  }).join('');

  document.getElementById('sheet-content').innerHTML =
    '<div style="font-family:Noto Sans JP,sans-serif;color:#1a1a2e;line-height:1.6;">'

    // Page 1
    + '<div style="padding:40px;min-height:200mm;page-break-after:always;box-sizing:border-box;">'
    + '<div style="background:linear-gradient(135deg,#66BB6A,#AED581);border-radius:12px;padding:24px 28px;margin-bottom:24px;">'
    + '<div style="font-size:10px;font-weight:700;color:rgba(27,58,42,0.6);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:6px;">Z\u4e16\u4ee3 Signal \u30da\u30eb\u30bd\u30ca\u30b7\u30fc\u30c8</div>'
    + '<div style="font-size:28px;font-weight:900;color:#1B3A2A;margin-bottom:4px;">' + esc(p.name) + '</div>'
    + '<div style="font-size:14px;color:rgba(27,58,42,0.75);margin-bottom:12px;">' + esc(p.tagline) + '</div>'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap;">'
    + [p.age, p.gender, p.area, p.job].filter(Boolean).map(function(v) {
        return '<span style="background:rgba(255,255,255,0.5);color:#1B3A2A;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;">' + esc(v) + '</span>';
      }).join('')
    + '</div></div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">'
    + '<div><div style="font-size:10px;font-weight:900;color:#888;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:10px;">\u4eba\u7269\u50cf</div><div style="font-size:13px;color:#333;line-height:1.8;">' + esc(p.description) + '</div></div>'

    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">' + quotesHTML + '</div></div>'

    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">' + kwArticlesHTML + '</div></div>'

}

function download(filename, text) {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(text);
  a.download = filename;
  a.click();
}
