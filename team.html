<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z世代 Signal ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --navy:#0F1F3D;--blue:#2463EB;--blue-lt:#EBF2FF;--green:#16A34A;
  --green-lt:#DCFCE7;--amber:#D97706;--red:#DC2626;
  --g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g400:#94A3B8;
  --g600:#475569;--g800:#1E293B;--bd:var(--g200);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--g50);color:var(--g800);font-size:14px;line-height:1.6}

/* HEADER */
.hdr{background:var(--navy);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:16px}
.hdr-badge{font-family:'DM Mono',monospace;font-size:9px;color:#64748B;letter-spacing:.15em;text-transform:uppercase}
.hdr-title{font-family:'DM Serif Display',serif;font-size:20px;color:#fff}
.hdr-r{display:flex;align-items:center;gap:10px}
.hdr-period{font-family:'DM Mono',monospace;font-size:10px;color:#64748B;background:rgba(255,255,255,.06);padding:3px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.08)}
.hdr-link{font-size:11px;color:#64748B;text-decoration:none;padding:3px 10px;border:1px solid rgba(255,255,255,.1);border-radius:4px;transition:color .15s}
.hdr-link:hover{color:#93C5FD}

/* OVERVIEW */
.overview{padding:20px 28px;display:grid;grid-template-rows:auto auto auto;gap:16px}

/* HERO */
.hero{background:var(--navy);border-radius:10px;padding:22px 26px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start}
.hero-label{font-family:'DM Mono',monospace;font-size:9px;color:#64748B;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.hero-theme{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;line-height:1.4;margin-bottom:10px}
.hero-kikan{display:inline-flex;align-items:center;gap:6px;background:rgba(36,99,235,.2);border:1px solid rgba(36,99,235,.3);color:#93C5FD;font-size:12px;padding:5px 12px;border-radius:5px}
.hero-stats{display:flex;flex-direction:column;gap:10px;min-width:140px}
.hstat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:7px;padding:10px 14px;text-align:center}
.hstat-n{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:#fff;line-height:1;margin-bottom:3px}
.hstat-l{font-size:10px;color:#64748B}

/* KW ROW */
.kw-row{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px 20px}
.sec-label{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;color:var(--g600);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px}
.kw-tags{display:flex;flex-wrap:wrap;gap:7px}
.kwtag{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:16px;font-size:12px;font-weight:500;border:1px solid}
.kwtag .cnt{font-family:'DM Mono',monospace;font-size:9px;opacity:.7}
.kwtag.hot{background:#FEF2F2;border-color:#FECACA;color:#991B1B}
.kwtag.warm{background:#FFF7ED;border-color:#FED7AA;color:#92400E}
.kwtag.cool{background:#EFF6FF;border-color:#BFDBFE;color:#1E40AF}
.kwtag.base{background:var(--g100);border-color:var(--g200);color:var(--g600)}

/* 3-COL */
.grid3{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:16px}
@media(max-width:900px){.grid3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid3{grid-template-columns:1fr}.hero{grid-template-columns:1fr}.hero-stats{flex-direction:row}}

.card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:16px 20px}
.card-title{font-size:12px;font-weight:700;color:var(--g800);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.card-title::before{content:'';display:block;width:3px;height:12px;background:var(--blue);border-radius:2px;flex-shrink:0}

/* CHART */
.chart-wrap{position:relative;height:170px}

/* WEEK LIST */
.wlist{display:flex;flex-direction:column;gap:7px}
.witem{display:grid;grid-template-columns:62px 1fr;gap:8px;padding:7px 9px;border-radius:6px;border:1px solid var(--g100)}
.witem.now{border-color:var(--blue);background:var(--blue-lt)}
.wdate{font-family:'DM Mono',monospace;font-size:9px;color:var(--g400);padding-top:1px}
.witem.now .wdate{color:var(--blue);font-weight:500}
.wtheme{font-size:11px;line-height:1.45}
.wkws{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.wkw{font-size:9px;padding:1px 6px;border-radius:3px;background:var(--g100);color:var(--g600);font-weight:500}
.witem.now .wkw{background:rgba(36,99,235,.1);color:var(--blue)}

/* INSIGHT */
.ilist{display:flex;flex-direction:column;gap:8px}
.iitem{display:flex;gap:9px;align-items:flex-start;padding:9px;border-radius:7px;background:var(--g50);border:1px solid var(--g100)}
.iicon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.itag{font-family:'DM Mono',monospace;font-size:8px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.itext{font-size:11px;line-height:1.5}

/* TABS */
.tabs-wrap{border-top:1px solid var(--bd);background:#fff}
.tabs-nav{display:flex;overflow-x:auto;border-bottom:1px solid var(--bd);padding:0 28px;gap:0}
.tabs-nav::-webkit-scrollbar{height:3px}
.tab-btn{padding:12px 18px;font-size:12px;font-weight:500;color:var(--g400);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab-btn:hover{color:var(--g800)}
.tab-btn.on{color:var(--blue);border-bottom-color:var(--blue)}
.tab-body{display:none;padding:24px 28px}
.tab-body.on{display:block}

/* WEEKLY TAB */
.wt-list{display:flex;flex-direction:column;gap:10px}
.wt-item{display:grid;grid-template-columns:90px 1fr;gap:14px;padding:12px 14px;border-radius:8px;border:1px solid var(--g100)}
.wt-item:first-child{border-color:var(--blue);background:var(--blue-lt)}
.wt-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--g400);padding-top:2px}
.wt-item:first-child .wt-date{color:var(--blue);font-weight:500}
.wt-theme{font-size:12px;font-weight:500;margin-bottom:4px}
.wt-kikan{font-size:11px;color:var(--g600);margin-bottom:5px}
.wt-kws{display:flex;flex-wrap:wrap;gap:4px}
.wt-kw{font-size:10px;padding:2px 7px;border-radius:3px;background:var(--g100);color:var(--g600)}
.wt-item:first-child .wt-kw{background:rgba(36,99,235,.1);color:var(--blue)}

/* ACCORDION */
.acc{display:flex;flex-direction:column;gap:10px}
.acc-item{border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;gap:10px;user-select:none;background:#fff}
.acc-hdr:hover{background:var(--g50)}
.acc-hdr-l{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap}
.acc-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;color:#fff}
.acc-subtitle{font-size:12px;font-weight:500;color:var(--g800)}
.acc-chev{font-size:10px;color:var(--g400);flex-shrink:0}
.acc-body{display:none;padding:0 16px 16px}
.acc-soron{background:linear-gradient(135deg,#E8F5E9,#FFFDE7);border-radius:8px;padding:12px 16px;margin-bottom:12px}
.acc-soron-label{font-size:9px;font-weight:700;color:var(--g600);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.acc-soron-text{font-size:13px;font-weight:700;line-height:1.5}
.acc-kikan{font-size:12px;background:rgba(255,255,255,.7);padding:6px 10px;border-radius:6px;margin-top:7px}
.acc-themes{display:flex;flex-direction:column;gap:6px}
.acc-theme{background:#fff;border-radius:7px;padding:9px 11px;border:1px solid var(--g100)}
.acc-theme-title{font-size:10px;font-weight:700;margin-bottom:3px}
.acc-theme-body{font-size:11px;color:var(--g600);line-height:1.5}

/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:14px}
.search-bar input{flex:1;padding:8px 14px;border:1px solid var(--bd);border-radius:7px;font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none}
.search-bar input:focus{border-color:var(--blue)}
.search-bar select{padding:8px 12px;border:1px solid var(--bd);border-radius:7px;font-size:12px;background:#fff;outline:none}
.s-results{display:flex;flex-direction:column;gap:6px}
.s-item{padding:9px 12px;border-radius:6px;border:1px solid var(--g100);cursor:pointer;transition:background .12s}
.s-item:hover{background:var(--g50)}
.s-title{font-size:12px;font-weight:500;margin-bottom:3px}
.s-meta{display:flex;gap:8px;font-size:10px;color:var(--g400)}
.s-week{background:var(--g100);padding:1px 6px;border-radius:3px}
.s-url{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px}
.kw-hl{background:rgba(36,99,235,.15);color:var(--blue);padding:0 2px;border-radius:2px;font-weight:700}
.s-count{font-size:11px;color:var(--g400);margin-bottom:8px;font-family:'DM Mono',monospace}

/* FOOTER */
.footer{padding:16px 28px;font-size:10px;color:var(--g400);font-family:'DM Mono',monospace;display:flex;justify-content:space-between;border-top:1px solid var(--bd)}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <span class="hdr-badge">Z世代 Signal</span>
    <span class="hdr-title">Z世代 Signal ダッシュボード</span>
  </div>
  <div class="hdr-r">
    <span class="hdr-period" id="hdr-period">—</span>
    <a class="hdr-link" href="../" target="_blank">詳細 →</a>
  </div>
</header>

<!-- ── OVERVIEW ── -->
<section class="overview" id="overview">

  <!-- HERO -->
  <div class="hero">
    <div>
      <div class="hero-label">今週のシグナル</div>
      <div class="hero-theme" id="hero-theme">—</div>
      <div class="hero-kikan" id="hero-kikan">—</div>
    </div>
    <div class="hero-stats">
      <div class="hstat"><div class="hstat-n" id="stat-art">—</div><div class="hstat-l">今週の記事数</div></div>
      <div class="hstat"><div class="hstat-n" id="stat-wks">—</div><div class="hstat-l">累計観測週数</div></div>
    </div>
  </div>

  <!-- KW -->
  <div class="kw-row">
    <div class="sec-label">直近8週 頻出キーワード</div>
    <div class="kw-tags" id="kw-tags"></div>
  </div>

  <!-- 3-COL -->
  <div class="grid3">
    <div class="card">
      <div class="card-title">カテゴリ別トレンド（直近8週）</div>
      <div class="chart-wrap"><canvas id="trend-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">直近の考察</div>
      <div class="wlist" id="wlist"></div>
    </div>
    <div class="card">
      <div class="card-title">シグナル</div>
      <div class="ilist" id="ilist"></div>
    </div>
  </div>

</section>

<!-- ── TABS ── -->
<div class="tabs-wrap">
  <nav class="tabs-nav">
    <button class="tab-btn on" data-tab="t-weekly">📊 週次考察</button>
    <button class="tab-btn" data-tab="t-monthly">📅 月次考察</button>
    <button class="tab-btn" data-tab="t-quarterly">🌐 Q総括</button>
    <button class="tab-btn" data-tab="t-annual">📋 年次考察</button>
    <button class="tab-btn" data-tab="t-search">🔍 記事検索</button>
  </nav>

  <div class="tab-body on" id="t-weekly">
    <div class="wt-list" id="wt-list"></div>
  </div>
  <div class="tab-body" id="t-monthly">
    <div class="acc" id="acc-monthly"></div>
  </div>
  <div class="tab-body" id="t-quarterly">
    <div class="acc" id="acc-quarterly"></div>
  </div>
  <div class="tab-body" id="t-annual">
    <div class="acc" id="acc-annual"></div>
  </div>
  <div class="tab-body" id="t-search">
    <div class="search-bar">
      <input id="sq" type="text" placeholder="キーワードで検索..." oninput="filterArticles()">
      <select id="sw" onchange="filterArticles()"><option value="">すべての週</option></select>
    </div>
    <div class="s-count" id="scount"></div>
    <div class="s-results" id="sresults"></div>
  </div>
</div>

<footer class="footer">
  <span>Z世代 Signal ダッシュボード</span>
  <span id="footer-updated">—</span>
</footer>

<script>
// DATA_PLACEHOLDER

(function(){
  const weekly = ZGENE.filter(e=>e.type==='weekly');
  const monthly = ZGENE.filter(e=>e.type==='monthly');
  const quarterly = ZGENE.filter(e=>e.type==='quarterly');
  const annual = ZGENE.filter(e=>e.type==='annual');
  const latest = weekly[0];
  const essay = latest.essay||{};

  const CATS = ['推し活・オタク','AI・テクノロジー','消費・購買','SNS・デジタル疲れ','価値観・アイデンティティ','働き方・キャリア'];
  const CAT_KWS = {
    'SNS・デジタル疲れ':['疲れ','SNS疲れ','デトックス','アナログ回帰','レトロ','BeReal'],
    '推し活・オタク':['推し活','推し','オタク','ファン'],
    'AI・テクノロジー':['AI','生成AI','ChatGPT','Gemini'],
    '消費・購買':['消費','購買','節約','コスパ','タイパ'],
    '働き方・キャリア':['就活','キャリア','転職','働き方'],
    '価値観・アイデンティティ':['価値観','本音','盛らない','距離'],
  };
  const COLS=['#6366F1','#2463EB','#059669','#D97706','#8B5CF6','#EC4899'];
  const THEME_COLS=['#388E3C','#29B6F6','#AB47BC','#FF7043','#26A69A','#FFA726','#EC407A'];

  function catCount(w){
    const text=(w.articles||[]).map(a=>a.title||'').join(' ');
    const res={};
    CATS.forEach(c=>{res[c]=(CAT_KWS[c]||[]).reduce((s,kw)=>s+(text.split(kw).length-1),0);});
    return res;
  }

  function fmtDate(s){return s?s.replace(/(\d{4})-(\d{2})-(\d{2})/,'$2/$3'):''}
  function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

  // ── HEADER ──
  const p=latest.period;
  document.getElementById('hdr-period').textContent=fmtDate(p.start)+'〜'+fmtDate(p.end);
  const genAt = (ZGENE_META.generated_at||'').slice(0,10);
  document.getElementById('footer-updated').textContent='更新: '+genAt;

  // ── HERO ──
  const summary=(essay.summary||'').split('\n')[0];
  document.getElementById('hero-theme').textContent=summary;
  const kikan=(essay.period_definition||'').replace(/^「|」$/g,'');
  document.getElementById('hero-kikan').textContent=kikan||summary.slice(0,40);
  document.getElementById('stat-art').textContent=(latest.articles||[]).length;
  document.getElementById('stat-wks').textContent=weekly.length;

  // ── KW TAGS ──
  const kwCnt={};
  weekly.slice(0,8).forEach(w=>{((w.essay||{}).keywords||[]).forEach(kw=>{kwCnt[kw]=(kwCnt[kw]||0)+1;});});
  const kwSorted=Object.entries(kwCnt).sort((a,b)=>b[1]-a[1]);
  const tagEl=document.getElementById('kw-tags');
  kwSorted.forEach(([kw,cnt],i)=>{
    const cls=i<2?'hot':i<5?'warm':i<10?'cool':'base';
    const t=document.createElement('span');
    t.className='kwtag '+cls;
    t.innerHTML=esc(kw)+'<span class="cnt">'+cnt+'週</span>';
    tagEl.appendChild(t);
  });

  // ── TREND CHART ──
  const w8=weekly.slice(0,8).reverse();
  new Chart(document.getElementById('trend-chart'),{
    type:'line',
    data:{
      labels:w8.map(w=>fmtDate(w.period.start)),
      datasets:CATS.slice(0,4).map((cat,ci)=>({
        label:cat,data:w8.map(w=>catCount(w)[cat]||0),
        borderColor:COLS[ci],backgroundColor:COLS[ci]+'22',
        borderWidth:2,pointRadius:2,tension:0.3,fill:false
      }))
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'bottom',labels:{font:{size:9},boxWidth:8,padding:8,usePointStyle:true}},
        tooltip:{titleFont:{size:10},bodyFont:{size:10}}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{size:9,family:'DM Mono'}}},
        y:{beginAtZero:true,grid:{color:'#F1F5F9'},ticks:{font:{size:9},stepSize:5}}
      }
    }
  });

  // ── WEEK LIST (概要: 直近4週) ──
  const wlistEl=document.getElementById('wlist');
  weekly.slice(0,4).forEach((w,i)=>{
    const e=w.essay||{};
    const theme=(e.summary||'').split('\n')[0];
    if(!theme)return;
    const kws=(e.keywords||[]).slice(0,3);
    const el=document.createElement('div');
    el.className='witem'+(i===0?' now':'');
    el.innerHTML=`<div class="wdate">${fmtDate(w.period.start)}</div>
      <div><div class="wtheme">${esc(theme)}</div>
      <div class="wkws">${kws.map(k=>'<span class="wkw">'+esc(k)+'</span>').join('')}</div></div>`;
    wlistEl.appendChild(el);
  });

  // ── INSIGHTS ──
  const topKw=kwSorted[0]?.[0]||'';
  const topKw2=kwSorted[1]?.[0]||'';
  const ilistEl=document.getElementById('ilist');
  [
    {icon:'🔥',bg:'#FEF2F2',tag:'RISING',tagColor:'#991B1B',
     text:`「${topKw}」が直近8週で最多。施策・コミュニケーションの最優先テーマ。`},
    {icon:'📡',bg:'#EFF6FF',tag:'CONTINUOUS',tagColor:'#1E40AF',
     text:`「${topKw2}」も継続出現。単発ではなく構造的な変化として認識すべきシグナル。`},
    {icon:'💡',bg:'#F0FDF4',tag:'THIS WEEK',tagColor:'#166534',
     text:`${kikan||summary.slice(0,50)}。次の施策フレームとして活用可。`},
  ].forEach(d=>{
    const el=document.createElement('div');
    el.className='iitem';
    el.innerHTML=`<div class="iicon" style="background:${d.bg}">${d.icon}</div>
      <div><div class="itag" style="color:${d.tagColor}">${d.tag}</div>
      <div class="itext">${esc(d.text)}</div></div>`;
    ilistEl.appendChild(el);
  });

  // ── WEEKLY TAB (全週) ──
  const wtEl=document.getElementById('wt-list');
  weekly.forEach((w,i)=>{
    const e=w.essay||{};
    const theme=(e.summary||'').split('\n')[0];
    const kikan2=(e.period_definition||'').replace(/^「|」$/g,'');
    const kws=(e.keywords||[]).slice(0,4);
    const el=document.createElement('div');
    el.className='wt-item'+(i===0?' ':' ');
    if(i===0)el.style.cssText='border-color:#2463EB;background:#EBF2FF';
    el.innerHTML=`
      <div class="wt-date" style="${i===0?'color:#2463EB;font-weight:500':''}">${fmtDate(w.period.start)}<br>〜${fmtDate(w.period.end)}</div>
      <div>
        <div class="wt-theme">${esc(theme)||'—'}</div>
        ${kikan2?`<div class="wt-kikan">💡 ${esc(kikan2)}</div>`:''}
        <div class="wt-kws">${kws.map(k=>'<span class="wt-kw" style="'+(i===0?'background:rgba(36,99,235,.1);color:#2463EB':'')+'"">'+esc(k)+'</span>').join('')}</div>
      </div>`;
    wtEl.appendChild(el);
  });

  // ── ACCORDION BUILDER ──
  function buildAcc(entries, containerId, color) {
    const el=document.getElementById(containerId);
    if(!entries.length){el.innerHTML='<div style="color:var(--g400);font-size:13px;padding:20px">データがまだありません</div>';return;}
    entries.forEach((entry,i)=>{
      const e=entry.essay||{};
      const period=entry.period||{};
      let label='';
      if(entry.type==='monthly'){
        const m=period.start?.match(/(\d{4})-(\d{2})/);
        label=m?`${m[1]}年${parseInt(m[2])}月`:'月次';
      } else if(entry.type==='quarterly'){
        const m=period.start?.match(/(\d{4})-(\d{2})/);
        if(m){const q=Math.ceil(parseInt(m[2])/3);label=`${m[1]}年Q${q}`;}
      } else if(entry.type==='annual'){
        const m=period.start?.match(/(\d{4})/);
        label=m?`${m[1]}年 年次考察`:'年次';
      }
      const soron=(e.summary||'').split('\n')[0];
      const kikan=(e.period_definition||'').replace(/^「|」$/g,'');
      const sections=e.sections||[];
      const id=`acc-${containerId}-${i}`;
      const item=document.createElement('div');
      item.className='acc-item';

      const themes=sections.filter(s=>s.heading&&!['総論','期間定義','🌐 Q1総括','🌐 Q総括','🔮 次の論点','📊 月別変化（最重要）','🌐 総括','🔧 実務示唆'].includes(s.heading)&&!s.heading.startsWith('🔎')&&!s.heading.startsWith('🔮')).slice(0,7);

      item.innerHTML=`
        <div class="acc-hdr" onclick="toggleAcc('${id}')">
          <div class="acc-hdr-l">
            <span class="acc-badge" style="background:${color}">${esc(label)}</span>
            <span class="acc-subtitle">${esc(kikan||soron.slice(0,50))}</span>
          </div>
          <span class="acc-chev" id="${id}-chev">${i===0?'▲':'▼'}</span>
        </div>
        <div class="acc-body" id="${id}-body" style="display:${i===0?'block':'none'}">
          ${soron||kikan?`<div class="acc-soron">
            ${soron?`<div class="acc-soron-label">📌 総論</div><div class="acc-soron-text">${esc(soron)}</div>`:''}
            ${kikan?`<div class="acc-kikan">💡 期間定義：<strong>${esc(kikan)}</strong></div>`:''}
          </div>`:''}
          ${themes.length?`<div class="acc-themes">${themes.map((s,ti)=>`
            <div class="acc-theme">
              <div class="acc-theme-title" style="color:${THEME_COLS[ti%THEME_COLS.length]}">${'①②③④⑤⑥⑦'[ti]||'•'} ${esc(s.heading.replace(/^[①②③④⑤⑥⑦\d+\.\s]+/,'').replace(/「|」/g,''))}</div>
              <div class="acc-theme-body">${esc((s.body||'').split('\n')[0])}</div>
            </div>`).join('')}</div>`:''}
        </div>`;
      el.appendChild(item);
    });
  }

  buildAcc(monthly,   'acc-monthly',   '#29B6F6');
  buildAcc(quarterly, 'acc-quarterly',  '#4CAF50');
  buildAcc(annual,    'acc-annual',    '#FF7043');

  // ── SEARCH ──
  const allArticles=[];
  weekly.forEach(w=>{
    const label=fmtDate(w.period.start)+'〜'+fmtDate(w.period.end);
    (w.articles||[]).forEach(a=>{
      if(a.url&&a.title)allArticles.push({title:a.title,url:a.url,week:label});
    });
  });
  const swEl=document.getElementById('sw');
  const weeks=[];
  weekly.forEach(w=>{const l=fmtDate(w.period.start)+'〜'+fmtDate(w.period.end);if(!weeks.includes(l))weeks.push(l);});
  weeks.forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;swEl.appendChild(o);});

  window.filterArticles=function(){
    const q=document.getElementById('sq').value.trim();
    const wf=swEl.value;
    let filtered=allArticles;
    if(wf)filtered=filtered.filter(a=>a.week===wf);
    if(q)filtered=filtered.filter(a=>a.title.includes(q)||a.url.includes(q));
    document.getElementById('scount').textContent=filtered.length+'件';
    const res=document.getElementById('sresults');
    res.innerHTML='';
    filtered.slice(0,100).forEach(a=>{
      let title=esc(a.title);
      if(q)title=title.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<span class="kw-hl">${m}</span>`);
      const el=document.createElement('div');
      el.className='s-item';
      el.innerHTML=`<div class="s-title">${title}</div>
        <div class="s-meta"><span class="s-week">${esc(a.week)}</span><span class="s-url">${esc(a.url.replace(/https?:\/\//,'').slice(0,55))}</span></div>`;
      el.onclick=()=>window.open(a.url,'_blank');
      res.appendChild(el);
    });
    if(filtered.length>100){const m=document.createElement('div');m.style.cssText='text-align:center;padding:10px;font-size:12px;color:var(--g400)';m.textContent=`他${filtered.length-100}件`;res.appendChild(m);}
  };
  filterArticles();

  // ── TABS ──
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
      document.querySelectorAll('.tab-body').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      document.getElementById(btn.dataset.tab).classList.add('on');
    };
  });

})();

window.toggleAcc=function(id){
  const body=document.getElementById(id+'-body');
  const chev=document.getElementById(id+'-chev');
  if(!body)return;
  const open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  if(chev)chev.textContent=open?'▼':'▲';
};
</script>
</body>
</html>
